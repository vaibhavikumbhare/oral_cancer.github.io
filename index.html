<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oral Cancer Detector - Live AI Detection</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.10.0/dist/tf-backend-webgl.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/blazeface@0.0.7/dist/blazeface.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-icon">🦷</div>
            <h1>Oral Cancer Detector</h1>
            <p>Live AI-powered oral cancer risk assessment</p>
            <div class="status" id="status">Loading AI Model...</div>
        </div>

        <!-- Camera & Controls -->
        <div class="camera-section">
            <div class="video-container">
                <video id="video" autoplay muted playsinline></video>
                <canvas id="canvas" class="hidden"></canvas>
                <div class="detection-overlay" id="overlay">
                    <div class="face-box" id="faceBox"></div>
                    <div class="risk-indicator" id="liveRisk">
                        <span id="riskText">Position face in frame</span>
                        <div id="riskBar"></div>
                    </div>
                </div>
            </div>
            
            <div class="controls">
                <button class="detect-btn primary" id="startBtn" onclick="toggleDetection()">
                    🚀 Start Live Detection
                </button>
                <button class="detect-btn secondary hidden" id="stopBtn" onclick="stopDetection()">
                    ⏹️ Stop Detection
                </button>
            </div>
        </div>

        <!-- Live Results -->
        <div class="live-results" id="liveResults">
            <div class="metric">
                <div class="metric-label">Risk Score</div>
                <div class="metric-value" id="riskScore">0%</div>
            </div>
            <div class="metric">
                <div class="metric-label">Confidence</div>
                <div class="metric-value" id="confidence">0%</div>
            </div>
            <div class="metric">
                <div class="metric-label">Status</div>
                <div class="metric-value" id="statusText">Ready</div>
            </div>
        </div>

        <!-- Final Analysis -->
        <div class="final-result hidden" id="finalResult">
            <!-- Dynamic content -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
